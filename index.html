<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VANTHEL: Las Leyendas del Parangueo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a227;--gold-light:#f0c040;--gold-dark:#8B6914;
  --purple:#9b59b6;--purple-light:#cc88ff;--purple-dark:#4a0080;
  --bg-deep:#04000d;--bg-mid:#0d0020;--red:#cc2200;
}
html,body{width:100%;height:100%}
body{background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Cinzel',serif;touch-action:none;-webkit-user-select:none;user-select:none}
#gameWrapper{position:relative;width:480px;height:820px;max-width:100vw;max-height:100vh;overflow:hidden;background:#04000d;box-shadow:0 0 60px rgba(0,0,0,.8)}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:linear-gradient(180deg,#04000d 0%,#0d0020 50%,#04000d 100%);padding:24px;text-align:center}
.screen.hidden{display:none!important}
.stars-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

.play-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:4px;padding:16px 60px;color:#1a1200;font-family:'Cinzel Decorative',cursive;font-size:16px;cursor:pointer;letter-spacing:3px;box-shadow:0 0 30px #c9a22766;transition:all .2s;margin-bottom:12px}
.play-btn:hover,.play-btn:active{box-shadow:0 0 60px #c9a227aa;transform:scale(1.04)}
.version-tag{position:absolute;bottom:16px;font-size:10px;color:rgba(255,255,255,.22);letter-spacing:3px}

/* ===== PORTADA A PANTALLA COMPLETA ===== */
.cover-screen{padding:0;justify-content:flex-end;background:#000;overflow:hidden}
#coverImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
#coverButtons{position:relative;z-index:2;width:100%;padding:90px 24px 42px;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.55) 45%,rgba(0,0,0,.92) 100%)}
.cover-row{display:flex;gap:8px;margin-top:10px;justify-content:center;flex-wrap:wrap}

/* ============ HUD ============ */
#hud{position:absolute;top:0;left:0;right:0;padding:10px 12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:50}
.hud-pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.7);border-radius:20px;padding:5px 11px;backdrop-filter:blur(4px);font-size:13px;font-weight:700}
.hud-coins{border:1px solid var(--gold);color:var(--gold-light)}
.hud-lives{border:1px solid #8B0000;color:#ff6666}
.coin-dot{width:13px;height:13px;background:radial-gradient(circle at 35% 35%,#ffe066,var(--gold),#7a5c00);border-radius:50%;border:1px solid #ffe066;box-shadow:0 0 6px #f0c04088}
#hudCenter{position:absolute;top:9px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:none;z-index:50}
.hud-level{color:var(--purple-light);font-size:9px;letter-spacing:2px;opacity:.85}

/* boss/mini-boss HP bar */
#bossBar{position:absolute;top:44px;left:50%;transform:translateX(-50%);width:300px;max-width:82%;z-index:55;pointer-events:none;text-align:center}
#bossBar.hidden{display:none!important}
#bossBarName{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:#ff9988;text-shadow:0 0 8px #000;margin-bottom:3px}
#bossBarTrack{height:11px;background:rgba(0,0,0,.6);border:1px solid #ff5544;border-radius:6px;overflow:hidden}
#bossBarFill{height:100%;width:100%;background:linear-gradient(90deg,#ff2200,#ff9944);transition:width .12s linear}

/* ============ CONTROLS ============ */
#controls{position:absolute;bottom:0;left:0;right:0;height:150px;display:flex;justify-content:space-between;align-items:flex-end;padding:0 16px 26px;pointer-events:none;z-index:50}
.ctrl-group{display:flex;gap:10px;pointer-events:all}
.btn{width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);backdrop-filter:blur(6px);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;transition:transform .08s,box-shadow .08s,background .08s;-webkit-tap-highlight-color:transparent}
.btn:active,.btn.pressed{background:rgba(155,89,182,.45);border-color:var(--purple);box-shadow:0 0 18px rgba(155,89,182,.6);transform:scale(.92)}
.btn-jump{border-color:rgba(255,200,0,.4)}
.btn-jump:active,.btn-jump.pressed{background:rgba(255,180,0,.4);border-color:#ffd700;box-shadow:0 0 22px rgba(255,215,0,.6)}
.btn-shoot{width:74px;height:74px;border-color:rgba(180,90,255,.55);color:#cc88ff;font-size:30px}
.btn-shoot:active,.btn-shoot.pressed{background:rgba(150,60,255,.5);border-color:#cc88ff;box-shadow:0 0 26px rgba(180,90,255,.8)}
.btn-duck{border-color:rgba(120,200,255,.45)}
.btn-duck:active,.btn-duck.pressed{background:rgba(60,150,255,.45);border-color:#5ab0ff;box-shadow:0 0 18px rgba(90,176,255,.65)}

/* ============ FLOAT TEXT ============ */
.float-text{position:absolute;pointer-events:none;font-family:'Cinzel',serif;font-weight:700;font-size:15px;color:var(--gold-light);text-shadow:0 0 10px var(--gold);animation:floatUp .9s ease-out forwards;z-index:200}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(.8)}}
.float-purple{color:var(--purple-light);text-shadow:0 0 10px var(--purple)}
.float-red{color:#ff5555;text-shadow:0 0 10px red}

#notification{position:absolute;top:-70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid var(--purple);border-radius:5px;padding:10px 18px;color:var(--purple-light);font-size:11px;letter-spacing:2px;max-width:90%;z-index:300;transition:top .4s ease;pointer-events:none;text-align:center}
#notification.show{top:14px}
#notification.gold{border-color:var(--gold);color:var(--gold-light)}

/* ===== BANNER CINEMÁTICO ===== */
#cineBanner{position:absolute;top:34%;left:0;right:0;text-align:center;z-index:120;pointer-events:none;opacity:0;transform:scale(.82);transition:opacity .25s ease,transform .25s ease;padding:0 18px}
#cineBanner.show{opacity:1;transform:scale(1)}
#cbTitle{font-family:'Cinzel Decorative',cursive;font-size:32px;line-height:1.1;letter-spacing:2px;color:#fff;text-shadow:0 0 18px #000,0 0 32px #000}
#cbSub{font-family:'Cinzel',serif;font-size:14px;letter-spacing:2px;color:rgba(255,255,255,.92);margin-top:8px;text-shadow:0 0 10px #000,0 0 4px #000}
#cineBanner.red #cbTitle{color:#ff5a44;text-shadow:0 0 22px #ff0000aa,0 0 6px #000}
#cineBanner.gold #cbTitle{color:#f0c040;text-shadow:0 0 22px #c9a227aa,0 0 6px #000}
#cineBanner.purple #cbTitle{color:#cc88ff;text-shadow:0 0 22px #9b59b6aa,0 0 6px #000}

/* ============ HUB ============ */
#hubScreen{justify-content:flex-start;padding-top:30px;overflow-y:auto}
.hub-header{font-family:'Cinzel Decorative',cursive;font-size:22px;color:var(--gold);text-shadow:0 0 20px #c9a22766;letter-spacing:2px;margin-bottom:2px}
.hub-sub{font-size:9px;color:var(--purple-light);letter-spacing:3px;text-transform:uppercase;margin-bottom:18px;opacity:.8}
.level-list{display:flex;flex-direction:column;gap:11px;width:100%;max-width:380px}
.level-card{display:flex;align-items:center;gap:12px;background:rgba(13,0,32,.85);border:1px solid rgba(155,89,182,.35);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s;text-align:left}
.level-card:hover{border-color:var(--gold);background:rgba(30,10,50,.9);transform:translateX(3px)}
.level-card.locked{opacity:.42;cursor:not-allowed;filter:grayscale(.6)}
.level-card.locked:hover{transform:none;border-color:rgba(155,89,182,.35);background:rgba(13,0,32,.85)}
.level-icon{font-size:30px;width:42px;text-align:center;flex-shrink:0}
.level-info{flex:1;min-width:0}
.level-name{color:#fff;font-size:13px;font-weight:600;margin-bottom:2px}
.level-desc{color:rgba(255,255,255,.5);font-size:10px;font-family:'IM Fell English',serif;font-style:italic;line-height:1.3}
.level-status{font-size:18px;flex-shrink:0}
.hub-bottom{display:flex;gap:10px;margin-top:20px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}

.sec-btn{background:transparent;border:1px solid var(--purple);border-radius:4px;padding:11px 20px;color:var(--purple-light);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;letter-spacing:2px;transition:all .2s}
.sec-btn:hover,.sec-btn:active{background:rgba(155,89,182,.2)}
.sec-btn.gold{border-color:var(--gold);color:var(--gold-light)}
.sec-btn.gold:hover{background:rgba(201,162,39,.2)}

#endTitle{font-family:'Cinzel Decorative',cursive;font-size:30px;letter-spacing:2px;margin-bottom:8px}
#endTitle.lose{color:var(--red);text-shadow:0 0 30px #cc220088}
#endTitle.win{color:var(--gold);text-shadow:0 0 30px #c9a22788}
.score-display{color:var(--gold-light);font-size:14px;letter-spacing:3px;margin-bottom:6px}
.coins-display{color:var(--purple-light);font-size:13px;letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:6px;justify-content:center}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:400px}
.reward-line{color:var(--gold-light);font-size:13px;line-height:1.8;letter-spacing:1px;margin-bottom:20px;text-shadow:0 0 10px #c9a22755}

#legendCard{position:absolute;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:400;padding:30px;text-align:center;backdrop-filter:blur(3px)}
.lc-inner{background:linear-gradient(160deg,#1a0030,#0d0020);border:2px solid var(--gold);border-radius:12px;padding:24px 22px;max-width:380px;box-shadow:0 0 50px #c9a22744;animation:popIn .5s ease-out}
@keyframes popIn{0%{opacity:0;transform:scale(.85) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.lc-badge{font-size:10px;letter-spacing:3px;color:var(--gold-light);text-transform:uppercase;margin-bottom:10px}
.lc-icon{font-size:50px;margin-bottom:10px}
.lc-title{font-family:'Cinzel Decorative',cursive;font-size:20px;color:var(--gold);margin-bottom:12px;letter-spacing:1px}
.lc-text{color:rgba(255,255,255,.8);font-size:12px;font-family:'IM Fell English',serif;font-style:italic;line-height:1.6;margin-bottom:18px}
.lc-cta{font-size:10px;color:var(--purple-light);letter-spacing:1px;margin-bottom:18px;border-top:1px solid rgba(155,89,182,.3);padding-top:14px}

#modal{position:absolute;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:450;padding:28px;text-align:center;backdrop-filter:blur(3px)}
.modal-inner{background:linear-gradient(160deg,#180028,#0a0018);border:2px solid var(--purple);border-radius:12px;padding:24px 20px;max-width:400px;width:100%;box-shadow:0 0 50px #9b59b644;animation:popIn .4s ease-out;max-height:90%;overflow-y:auto}
.modal-title{font-family:'Cinzel Decorative',cursive;font-size:20px;color:var(--gold-light);margin-bottom:6px;letter-spacing:1px}
.modal-sub{font-size:11px;color:rgba(255,255,255,.55);font-family:'IM Fell English',serif;font-style:italic;margin-bottom:18px}
.shop-item{display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.4);border:1px solid rgba(155,89,182,.3);border-radius:8px;padding:11px 13px;margin-bottom:9px;text-align:left}
.shop-icon{font-size:26px;width:36px;text-align:center}
.shop-info{flex:1}
.shop-name{color:#fff;font-size:12px;font-weight:600}
.shop-cost{color:var(--gold-light);font-size:11px;display:flex;align-items:center;gap:4px;margin-top:2px}
.shop-buy{background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:4px;padding:8px 14px;color:#1a1200;font-family:'Cinzel',serif;font-weight:700;font-size:10px;cursor:pointer;letter-spacing:1px}
.shop-buy:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1)}
.shop-tag{font-size:8px;letter-spacing:1px;color:var(--purple-light);background:rgba(155,89,182,.15);border-radius:3px;padding:2px 5px;margin-top:3px;display:inline-block}
.code-input{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--purple);border-radius:6px;padding:12px;color:#fff;font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;text-align:center;text-transform:uppercase;margin-bottom:14px}
.code-input:focus{outline:none;border-color:var(--gold)}
.modal-close{margin-top:14px}
.coin-inline{width:13px;height:13px;background:radial-gradient(circle at 35% 35%,#ffe066,var(--gold),#7a5c00);border-radius:50%;border:1px solid #ffe066;display:inline-block;vertical-align:middle}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.04)}
::-webkit-scrollbar-thumb{background:rgba(155,89,182,.4);border-radius:3px}
</style>
</head>
<body>
<div id="gameWrapper">

  <canvas id="gameCanvas" width="480" height="820"></canvas>

  <div id="notification"></div>
  <div id="cineBanner"><div id="cbTitle"></div><div id="cbSub"></div></div>

  <div id="hud" class="hidden">
    <div class="hud-pill hud-lives">❤ <span id="hudLives">3</span></div>
    <div class="hud-pill hud-coins"><span class="coin-dot"></span><span id="hudCoins">0</span></div>
  </div>
  <div id="hudCenter" class="hidden">
    <div class="hud-level" id="hudLevelName">EL TÚNEL SIN FIN</div>
  </div>
  <div id="bossBar" class="hidden">
    <div id="bossBarName"></div>
    <div id="bossBarTrack"><div id="bossBarFill"></div></div>
  </div>

  <div id="controls" class="hidden">
    <div class="ctrl-group">
      <div class="btn" id="btnLeft">◀</div>
      <div class="btn" id="btnRight">▶</div>
      <div class="btn btn-duck" id="btnDuck">⤓</div>
    </div>
    <div class="ctrl-group">
      <div class="btn btn-jump" id="btnJump">⤒</div>
      <div class="btn btn-shoot" id="btnShoot">🟣</div>
    </div>
  </div>

  <!-- PORTADA -->
  <div id="startScreen" class="screen cover-screen">
    <img id="coverImg" src="Copilot_20260621_160217.png" alt="VANTHEL">
    <div id="coverButtons">
      <button class="play-btn" id="btnStart">JUGAR</button>
      <div class="cover-row">
        <button class="sec-btn" id="btnHowTo">CÓMO JUGAR</button>
        <button class="sec-btn mute-btn">🔊 SONIDO: ON</button>
      </div>
    </div>
    <div class="version-tag">v2.0 · ACCIÓN</div>
  </div>

  <!-- HUB -->
  <div id="hubScreen" class="screen hidden">
    <div class="stars-bg" id="starsHub"></div>
    <div class="hud-pill hud-coins" style="position:absolute;top:14px;right:14px"><span class="coin-dot"></span><span id="hubCoins">0</span></div>
    <div class="hub-header">El Cráter</div>
    <div class="hub-sub">Rincón de Parangueo</div>
    <div class="level-list" id="levelList"></div>
    <div class="hub-bottom">
      <button class="sec-btn gold" id="btnShop">🛒 TIENDA</button>
      <button class="sec-btn" id="btnCodes">🔍 CÓDIGOS</button>
      <button class="sec-btn mute-btn">🔊 SONIDO: ON</button>
      <button class="sec-btn" id="btnBackTitle">◀ INICIO</button>
    </div>
  </div>

  <!-- END -->
  <div id="endScreen" class="screen hidden">
    <div class="stars-bg" id="starsEnd"></div>
    <h1 id="endTitle" class="lose">FIN</h1>
    <div class="score-display" id="endDist">0 enemigos derrotados</div>
    <div class="coins-display"><span class="coin-dot"></span><span id="endCoins">0</span> VANTHEL Coins</div>
    <div id="endReward" class="reward-line"></div>
    <div class="btn-row">
      <button class="sec-btn gold" id="btnRetry">↺ REINTENTAR</button>
      <button class="sec-btn" id="btnWatchAd">📺 ANUNCIO · +1 VIDA</button>
      <button class="sec-btn" id="btnEndHub">🗺 MAPA</button>
    </div>
  </div>

  <!-- LEGEND CARD -->
  <div id="legendCard">
    <div class="lc-inner">
      <div class="lc-badge">📜 Carta de Leyenda desbloqueada</div>
      <div class="lc-icon" id="lcIcon">🕳️</div>
      <div class="lc-title" id="lcTitle"></div>
      <div class="lc-text" id="lcText"></div>
      <div class="lc-cta" id="lcCta">▶ Mira la historia completa en mi canal</div>
      <button class="play-btn" id="lcContinue" style="padding:13px 40px;font-size:14px">CONTINUAR</button>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal"><div class="modal-inner" id="modalInner"></div></div>

</div>

<script>
"use strict";
/* =====================================================================
   VANTHEL — Run & Gun lateral (caminar + disparar bolas moradas)
   ===================================================================== */
const W = 480, H = 820;
const GROUND_Y = 600;
const SAVE_KEY = "vanthel_save_v2";
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const STATE = { TITLE:"title", HUB:"hub", PLAYING:"playing", END:"end" };
let state = STATE.TITLE;

/* ---- Niveles (mapa) ---- */
const LEVELS = [
  { id:1, icon:"🕳️", name:"El Túnel Sin Fin", desc:"Abre fuego en el túnel que no termina.",
    legend:{icon:"🕳️",title:"El Túnel Sin Fin",text:"Quienes entran al túnel juran que se extiende sin final, como si el cráter quisiera tragarlos."} },
  { id:2, icon:"🔊", name:"Los Ecos", desc:"Acalla las voces que resuenan en la caverna.",
    legend:{icon:"🔊",title:"Los Ecos",text:"Se escuchan ecos que no pertenecen a nadie presente; repiten tu voz para siempre."} },
  { id:3, icon:"👽", name:"Objetos de Otro Mundo", desc:"Destruye los artefactos antes de que despierten.",
    legend:{icon:"👽",title:"Objetos de Otro Mundo",text:"Artefactos que no parecen de este mundo: flotan, brillan y zumban con energía desconocida."} },
  { id:4, icon:"👻", name:"Las Ánimas", desc:"Disipa a las almas que vagan por el santuario.",
    legend:{icon:"👻",title:"Las Ánimas",text:"Las ánimas del Parangueo vagan sin descanso entre las sombras buscando el calor de los vivos."} },
  { id:5, icon:"🛸", name:"El Portal y los OVNIs", desc:"Derriba la invasión y alcanza el portal.",
    legend:{icon:"🛸",title:"El Portal y los OVNIs",text:"Un portal se abre y se cierra sobre la laguna; de él salen luces que descienden con rayos."} },
  { id:6, icon:"🦕", name:"El Monstruo de la Laguna", desc:"Enfrenta al coloso del cráter.",
    legend:{icon:"🦕",title:"El Monstruo de la Laguna",text:"En la laguna habita una criatura colosal. Quien la enfrenta y sobrevive se vuelve leyenda."} },
];

/* ---- Datos de combate por nivel ---- */
const LD = {
  1:{ objective:"Cruza el túnel y limpia el camino a tiros",
      sky1:"#0a0510", sky2:"#1c0a18", ground:"#140a12", accent:"#caa", prop:"tomb",
      roster:[{arch:"melee",emoji:"🧟",color:"#7aa24a"},{arch:"flyer",emoji:"🦇",color:"#cfcfcf"},{arch:"melee",emoji:"🧛",color:"#d04a5e"}],
      ev1:"¡EMBOSCADA!", ev2:"¡DERRUMBE!", ev2k:"ambush",
      mini:{name:"VIGÍA DEL TÚNEL",emoji:"🦇",hp:24,color:"#cc4444"},
      boss:{name:"GUARDIÁN DEL FONDO",emoji:"👁️",hp:60,color:"#ff3322"},
      zone:{name:"LA CRIPTA",sky1:"#0a0306",sky2:"#220808",ground:"#1a0808",accent:"#e87",prop:"tomb"},
      reward:{xp:120, ability:"Disparo rápido"} },
  2:{ objective:"Sigue los ecos y silencia su origen",
      sky1:"#001018", sky2:"#03242e", ground:"#06181c", accent:"#0cc", prop:"crystal",
      roster:[{arch:"flyshooter",emoji:"🔊",color:"#00d0d0"},{arch:"flyer",emoji:"🦇",color:"#cfcfcf"},{arch:"shooter",emoji:"📢",color:"#0aa"}],
      ev1:"¡ESTRUENDO!", ev2:"¡ENJAMBRE!", ev2k:"ambush",
      mini:{name:"ECO VIVIENTE",emoji:"🔊",hp:30,color:"#00cccc"},
      boss:{name:"LA VOZ DEL CRÁTER",emoji:"📢",hp:78,color:"#00e0e0"},
      zone:{name:"GRUTA DE CRISTAL",sky1:"#001018",sky2:"#063a44",ground:"#04222a",accent:"#6fd",prop:"crystal"},
      reward:{xp:160, ability:"Doble disparo"} },

/* ---------------------------------------------------------------------
   SONIDO (Web Audio API)
--------------------------------------------------------------------- */
const SFX = (function(){
  let ac=null, master=null, started=false, muted=!!save.muted, amb=null, scareTimer=null, heartAcc=0, noiseBuf=null;
  function ensure(){ if(ac) return true; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return false;
    ac=new AC(); master=ac.createGain(); master.gain.value=muted?0:0.85; master.connect(ac.destination);
    noiseBuf=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate); const d=noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; return true; }
  function unlock(){ if(!ensure())return; if(ac.state==="suspended")ac.resume(); started=true; }
  function now(){ return ac.currentTime; }
  function tone(freq,dur,type,vol,glide,dest){ if(!ac)return; const o=ac.createOscillator(),g=ac.createGain();
    o.type=type||"sine"; o.frequency.setValueAtTime(freq,now()); if(glide)o.frequency.exponentialRampToValueAtTime(Math.max(1,glide),now()+dur);
    g.gain.setValueAtTime(0.0001,now()); g.gain.exponentialRampToValueAtTime(vol||0.3,now()+0.012); g.gain.exponentialRampToValueAtTime(0.0001,now()+dur);
    o.connect(g); g.connect(dest||master); o.start(); o.stop(now()+dur+0.05); }
  function noise(dur,vol,ff){ if(!ac)return; const s=ac.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
    const f=ac.createBiquadFilter(); f.type="lowpass"; f.frequency.value=ff||800; const g=ac.createGain();
    g.gain.setValueAtTime(vol||0.3,now()); g.gain.exponentialRampToValueAtTime(0.0001,now()+dur); s.connect(f); f.connect(g); g.connect(master); s.start(); s.stop(now()+dur+0.05); }
  function shoot(){ if(!started)return; tone(560,0.07,"sawtooth",0.14,300); }
  function enemyHit(){ if(!started)return; tone(300,0.05,"square",0.10,200); }
  function enemyDie(){ if(!started)return; tone(160,0.18,"square",0.2,60); noise(0.12,0.12,1200); }
  function jump(){ if(!started)return; tone(240,0.16,"square",0.16,500); }
  function coin(){ if(!started)return; tone(880,0.07,"sine",0.18,1100); }
  function hurt(){ if(!started)return; tone(180,0.32,"sawtooth",0.32,55); noise(0.2,0.3,500); }
  function win(){ if(!started)return; [392,523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.3,"triangle",0.26),i*120)); }
  function lose(){ if(!started)return; tone(220,1.0,"sawtooth",0.3,40); noise(0.7,0.22,300); }
  function bossRoar(){ if(!started)return; tone(70,0.8,"sawtooth",0.36,45); tone(95,0.8,"square",0.16,55); noise(0.6,0.26,260); }
  function scare(){ if(!started)return; tone(1400+Math.random()*500,0.16,"sawtooth",0.2,300); }
  function startAmbient(lvl){ if(!ensure())return; unlock(); stopAmbient(); amb={};
    const base=lvl&&lvl.id===6?44:54;
    amb.d1=ac.createOscillator();amb.d1.type="sawtooth";amb.d1.frequency.value=base;
    amb.d2=ac.createOscillator();amb.d2.type="sawtooth";amb.d2.frequency.value=base*1.01;
    amb.dg=ac.createGain();amb.dg.gain.value=0.10; const lp=ac.createBiquadFilter();lp.type="lowpass";lp.frequency.value=320;
    amb.d1.connect(lp);amb.d2.connect(lp);lp.connect(amb.dg);amb.dg.connect(master);amb.d1.start();amb.d2.start();
    const loop=()=>{ scareTimer=setTimeout(()=>{ if(amb){ if(Math.random()<0.5)scare(); loop(); } }, 5000+Math.random()*8000); }; loop(); heartAcc=0; }
  function stopAmbient(){ if(scareTimer){clearTimeout(scareTimer);scareTimer=null;} if(!amb)return; try{amb.d1.stop();amb.d2.stop();}catch(e){} amb=null; }
  function tickHeartbeat(dt,lives){ if(!started||muted||lives>1)return; heartAcc+=dt; if(heartAcc>=30){heartAcc=0;tone(60,0.12,"sine",0.36,42);} }
  function toggleMute(){ muted=!muted; save.muted=muted; persist(); if(master)master.gain.value=muted?0:0.85; if(!muted)unlock(); return muted; }
  function isMuted(){ return muted; }
  return { unlock,shoot,enemyHit,enemyDie,jump,coin,hurt,win,lose,bossRoar,scare,startAmbient,stopAmbient,tickHeartbeat,toggleMute,isMuted };
})();

const input = { left:false, right:false, shoot:false, down:false };
function bindHold(el,key){
  const dn=(e)=>{ e.preventDefault(); input[key]=true; el.classList.add("pressed"); SFX.unlock(); };
  const up=(e)=>{ e.preventDefault(); input[key]=false; el.classList.remove("pressed"); };
  el.addEventListener("touchstart",dn,{passive:false}); el.addEventListener("touchend",up,{passive:false});
  el.addEventListener("touchcancel",up,{passive:false}); el.addEventListener("mousedown",dn);
  el.addEventListener("mouseup",up); el.addEventListener("mouseleave",up);
}
function bindTap(el,fn){
  const dn=(e)=>{ e.preventDefault(); el.classList.add("pressed"); fn(); };
  const up=(e)=>{ e.preventDefault(); el.classList.remove("pressed"); };
  el.addEventListener("touchstart",dn,{passive:false}); el.addEventListener("touchend",up,{passive:false});
  el.addEventListener("mousedown",dn); el.addEventListener("mouseup",up); el.addEventListener("mouseleave",up);
}
bindHold(document.getElementById("btnLeft"),"left");
bindHold(document.getElementById("btnRight"),"right");
bindHold(document.getElementById("btnShoot"),"shoot");
bindHold(document.getElementById("btnDuck"),"down");

function tryJump(){
  if(state!==STATE.PLAYING || !game || !game.running) return;
  const p=game.player;
  if(p.onGround){ p.vy=-15; p.onGround=false; SFX.jump(); }
}
window.addEventListener("keydown",(e)=>{
  if(e.code==="ArrowLeft"||e.code==="KeyA") input.left=true;
  if(e.code==="ArrowRight"||e.code==="KeyD") input.right=true;
  if(e.code==="KeyJ"||e.code==="KeyK"||e.code==="KeyF") input.shoot=true;
  if(e.code==="ArrowDown"||e.code==="KeyS"){ e.preventDefault(); input.down=true; }
  if(e.code==="Space"||e.code==="ArrowUp"||e.code==="KeyW"){ e.preventDefault(); if(!e.repeat) tryJump(); }
});
window.addEventListener("keyup",(e)=>{
  if(e.code==="ArrowLeft"||e.code==="KeyA") input.left=false;
  if(e.code==="ArrowRight"||e.code==="KeyD") input.right=false;
  if(e.code==="KeyJ"||e.code==="KeyK"||e.code==="KeyF") input.shoot=false;
  if(e.code==="ArrowDown"||e.code==="KeyS") input.down=false;
});

/* ---------------------------------------------------------------------
   HELPERS
--------------------------------------------------------------------- */
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function enemyBox(e){ return { l:e.x-e.w/2, r:e.x+e.w/2, t:e.y-e.h/2, b:e.y+e.h/2 }; }
function hitBox(px,py,e){ const b=enemyBox(e); return px>b.l-5 && px<b.r+5 && py>b.t-12 && py<b.b+12; }
let shakeAmt=0; function shake(){ shakeAmt=10; }

/* ---------------------------------------------------------------------
   BUCLE Y UPDATE
--------------------------------------------------------------------- */
let lastTime=0;
function loop(t){
  const dt=Math.min(2,(t-lastTime)/16.67||1); lastTime=t;
  if(state===STATE.PLAYING && game && game.running) update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt){
  const g=game, p=g.player;
  g.scroll += 2.3*dt;

  // movimiento lateral
  if(input.left) p.x -= 3.4*dt;
  if(input.right) p.x += 3.4*dt;
  p.x = clamp(p.x, 46, W-130);

  // salto / gravedad
  p.vy += 0.8*dt; p.y += p.vy*dt;
  if(p.y>=GROUND_Y){ p.y=GROUND_Y; p.vy=0; p.onGround=true; }
  if(p.onGround) p.walk += 0.3*dt;
  // agacharse (solo en el suelo): baja la altura para esquivar disparos
  p.ducking = !!input.down && p.onGround;
  p.curH = p.ducking ? 36 : 96;
  if(p.invuln>0) p.invuln-=dt;
  if(p.flash>0) p.flash-=dt;

  // disparo
  p.shootCd-=dt;
  if(input.shoot && p.shootCd<=0){ fireBall(); p.shootCd = save.abilities.includes("Disparo rápido")?8:11; }

  updatePBalls(dt);
  updateEnemies(dt);
  updateEBullets(dt);
  if(g.miniBoss) updateMiniBoss(dt);
  if(g.boss) updateBoss(dt);
  updateParticles(dt);
  runStep(dt);
  if(g.weather>0) g.weatherT+=dt;
  SFX.tickHeartbeat(dt, g.lives);
  updateHUD();
}

/* ---- balas moradas del jugador ---- */
function fireBall(){
  const p=game.player;
  const y = p.ducking ? p.y-28 : p.y-64;
  game.pballs.push({ x:p.x+28, y:y, vx:9, r:9 });
  if(save.abilities.includes("Doble disparo")) game.pballs.push({ x:p.x+28, y:y+24, vx:9, r:8 });
  p.flash=6; SFX.shoot();
}
function updatePBalls(dt){
  const g=game;
  for(const b of g.pballs){
    b.x += b.vx*dt;
    for(const e of g.enemies){ if(!e.dead && hitBox(b.x,b.y,e)){ damageEnemy(e,1,b); b.dead=true; break; } }
    if(!b.dead && g.miniBoss && hitBox(b.x,b.y,g.miniBoss)){ damageBoss(g.miniBoss,1,b,true); b.dead=true; }
    if(!b.dead && g.boss && hitBox(b.x,b.y,g.boss)){ damageBoss(g.boss,1,b,false); b.dead=true; }
  }
  g.pballs = g.pballs.filter(b=>!b.dead && b.x<W+30);
}

/* ---- enemigos ---- */
function updateEnemies(dt){
  const g=game, p=g.player;
  for(const e of g.enemies){
    if(e.dead) continue;
    if(e.flash>0) e.flash-=dt;
    if(e.arch.sine){ e.sineT+=0.06*dt; e.y = e.baseY + Math.sin(e.sineT)*34; }
    if(e.arch.shoots && e.x<=e.stopX){
      e.x=e.stopX; e.shootCd-=dt;
      if(e.shootCd<=0){ enemyShoot(e); e.shootCd=72+Math.random()*40; }
    } else {
      e.x -= e.arch.speed*dt;
    }
    if(e.arch.melee && p.invuln<=0 && Math.abs(e.x-p.x)<34 && Math.abs(e.y-(p.y-32))<56) hurtPlayer();
    if(e.x < -60) e.dead=true;
  }
  g.enemies = g.enemies.filter(e=>!e.dead);
}
function enemyShoot(e){
  const p=game.player, tx=p.x, ty=p.y-40;
  const dx=tx-e.x, dy=ty-e.y, d=Math.hypot(dx,dy)||1, sp=4.0;
  game.ebullets.push({ x:e.x-16, y:e.y, vx:dx/d*sp, vy:dy/d*sp, r:7, color:e.color||"#ffaa33" });
}
function damageEnemy(e,dmg,src){
  e.hp-=dmg; e.flash=6; burst(src.x,e.y,"#cc88ff",5); SFX.enemyHit();
  if(e.hp<=0) killEnemy(e);
}
function killEnemy(e){
  e.dead=true; game.kills++;
  const val=e.coin||1; game.coinsRun+=val;
  floatTextW(e.x,e.y,"+"+val,""); burst(e.x,e.y,e.color||"#fff",12); SFX.enemyDie();
}

/* ---- balas enemigas ---- */
function updateEBullets(dt){
  const g=game, p=g.player;
  for(const b of g.ebullets){
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    // caja del jugador (al agacharse la cabeza baja y los disparos altos pasan)
    if(p.invuln<=0 && b.x>p.x-18 && b.x<p.x+18 && b.y>p.y-p.curH && b.y<p.y-2){ b.dead=true; hurtPlayer(); }
  }
  g.ebullets = g.ebullets.filter(b=>!b.dead && b.x>-30 && b.x<W+30 && b.y>-30 && b.y<H+30);
}

function hurtPlayer(){
  const p=game.player;
  if(p.invuln>0) return;
  game.lives-=1; p.invuln=75;
  burst(p.x,p.y-50,"#ff4444",14); floatTextW(p.x,p.y-90,"-1 ❤","float-red"); shake(); SFX.hurt();
  if(game.lives<=0) endRun(false);
}

/* ---- mini-jefe y jefe ---- */
function spawnMiniBoss(){ game.miniBoss=mkBoss(ld().mini,true); showBossBar(); SFX.bossRoar(); }
function spawnBoss(){ game.boss=mkBoss(ld().boss,false); game.bossSpawned=true; showBossBar(); SFX.bossRoar(); }
function mkBoss(def,mini){
  return { name:def.name, emoji:def.emoji, color:def.color, hp:def.hp, maxhp:def.hp,
    x:W+90, y:GROUND_Y-116, baseY:GROUND_Y-116, w:mini?92:124, h:mini?92:124,
    t:0, enter:true, shootCd:60, phase:1, flash:0, mini:!!mini };
}
function updateMiniBoss(dt){ bossLike(game.miniBoss,dt,300); }
function updateBoss(dt){ bossLike(game.boss,dt,288); }
function bossLike(b,dt,stopX){
  b.t+=dt; if(b.flash>0) b.flash-=dt;
  if(b.enter){ b.x -= 2.4*dt; if(b.x<=stopX){ b.x=stopX; b.enter=false; } }
  b.y = b.baseY + Math.sin(b.t*0.05)*22;
  const ratio=b.hp/b.maxhp; b.phase = ratio<0.34?3:(ratio<0.67?2:1);
  if(!b.enter){ b.shootCd-=dt; if(b.shootCd<=0){ bossAttack(b); b.shootCd=(b.phase===3?34:b.phase===2?48:64)+Math.random()*20; } }
  updateBossBar();
}
function bossAttack(b){
  const p=game.player, n=b.phase+(b.mini?0:1);
  for(let i=0;i<n;i++){
    const ang=Math.atan2((p.y-40)-b.y,(p.x)-b.x)+(i-(n-1)/2)*0.22, sp=4.2;
    game.ebullets.push({ x:b.x-30, y:b.y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, r:9, color:b.color });
  }
  if(!b.mini && b.phase>=2 && Math.random()<0.5) spawnWaveEnemy("all");
  SFX.bossRoar();
}
function damageBoss(b,dmg,src,mini){
  b.hp-=dmg; b.flash=6; burst(src.x,b.y,"#cc88ff",6); SFX.enemyHit(); updateBossBar();
  if(b.hp<=0) killBoss(b,mini);
}
function killBoss(b,mini){
  burst(b.x,b.y,b.color,42); shake(); SFX.enemyDie();
  const val=mini?15:40; game.coinsRun+=val; floatTextW(b.x,b.y,"+"+val,"");
  if(mini) game.miniBoss=null; else game.boss=null;
  if(!game.miniBoss && !game.boss) hideBossBar();
}

/* ---- driver de misión por pasos ---- */
function runStep(dt){
  const g=game, s=g.script[g.step]; if(!s) return;
  if(!g.stepInit){ enterStep(s); g.stepInit=true; }
  if(s.t==="banner"){ g.stepTimer-=dt; if(g.stepTimer<=0) nextStep(); }
  else if(s.t==="wave"){
    if(g.spawnLeft>0){ g.spawnTimer-=dt; if(g.spawnTimer<=0){ spawnWaveEnemy(s.pool); g.spawnLeft--; g.spawnTimer=s.rate; } }
    if(g.spawnLeft<=0 && g.enemies.length===0) nextStep();
  }
  else if(s.t==="miniboss"){ if(!g.miniBoss) nextStep(); }
  else if(s.t==="boss"){ if(g.bossSpawned && !g.boss) winLevel(); }
  else if(s.t==="win"){ winLevel(); }
}
function enterStep(s){
  const g=game;
  if(s.t==="banner"){ showBanner(s.title,s.sub,s.cls); g.stepTimer=s.wait; if(s.zone) enterZone(); if(s.event) triggerEvent(s.event); }
  else if(s.t==="wave"){ g.spawnLeft=s.count; g.spawnTimer=18; }
  else if(s.t==="miniboss"){ spawnMiniBoss(); }
  else if(s.t==="boss"){ spawnBoss(); }
}
function nextStep(){ game.step++; game.stepInit=false; }

function spawnWaveEnemy(pool){
  const roster=ld().roster; let opts=roster;
  if(pool==="air") opts=roster.filter(r=>ARCH[r.arch].air);
  else if(pool==="ground") opts=roster.filter(r=>!ARCH[r.arch].air);
  if(!opts.length) opts=roster;
  spawnEnemy(opts[Math.floor(Math.random()*opts.length)]);
}
function spawnEnemy(r){
  const a=ARCH[r.arch];

  game.enemies.push({ arch:a, emoji:r.emoji, color:r.color,
    x:W+30+Math.random()*50, y:baseY, baseY:baseY, w:a.w, h:a.h, hp:a.hp, maxhp:a.hp,
    flash:0, sineT:Math.random()*6.28, shootCd:50+Math.random()*40, stopX:a.stopX||0, coin:a.shoots?2:1 });
}

  else if(kind==="storm"){ game.weather=1; game.weatherT=0; SFX.bossRoar(); }
}
function enterZone(){

function updateParticles(dt){

/* ---- texto flotante ---- */
function floatTextW(wx,wy,txt,cls){
  const wrap=document.getElementById("gameWrapper"); if(!wrap.getBoundingClientRect) return;
  const rect=wrap.getBoundingClientRect();
  const sx=rect.left+(wx/W)*rect.width, sy=rect.top+(wy/H)*rect.height;

  el.style.left=sx+"px"; el.style.top=sy+"px"; document.body.appendChild(el); setTimeout(()=>el.remove(),950);

const HERO_SRC = "personaje_original.png";
const heroImg = new Image();
let heroReady = false;
heroImg.onload = ()=>{ heroReady=true; };
heroImg.onerror = ()=>{ heroReady=false; };

/* ---------------------------------------------------------------------
   RENDER
--------------------------------------------------------------------- */
function render(){
  ctx.clearRect(0,0,W,H);
  if(state===STATE.PLAYING && game){
    drawScene();
    ctx.save();
    if(shakeAmt>0){ ctx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt); shakeAmt*=0.85; if(shakeAmt<0.5)shakeAmt=0; }
    drawEnemies();
    drawBigBosses();
    drawPlayer();
    drawPBalls();
    drawEBullets();
    drawParticles();
    ctx.restore();
    drawWeather();
    drawVignette();
  }
}

function drawScene(){
  const g=game, th=g.theme, s=g.scroll;
  const grad=ctx.createLinearGradient(0,0,0,GROUND_Y);
  grad.addColorStop(0,th.sky1); grad.addColorStop(1,th.sky2);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,GROUND_Y+60);
  // halo lejano
  ctx.save(); ctx.globalAlpha=0.45;
  const mg=ctx.createRadialGradient(W*0.74,118,6,W*0.74,118,150);
  mg.addColorStop(0,th.accent); mg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,300); ctx.restore();
  // cordilleras
  drawRidge(s*0.15, GROUND_Y-70, 70, "rgba(0,0,0,0.45)");
  drawRidge(s*0.30, GROUND_Y-30, 46, "rgba(0,0,0,0.6)");
  // props medios
  drawProps(th.prop, s*0.6, th.accent);
  // suelo
  ctx.fillStyle=th.ground; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fillRect(0,GROUND_Y,W,5);
  ctx.strokeStyle="rgba(255,255,255,0.06)"; ctx.lineWidth=2;
  for(let i=0;i<9;i++){ const x=((i*70 - s)%(W+70)+(W+70))%(W+70); ctx.beginPath(); ctx.moveTo(x,GROUND_Y+14); ctx.lineTo(x-26,H); ctx.stroke(); }
}
function drawRidge(off,baseY,amp,color){
  ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(0,GROUND_Y);
  for(let x=0;x<=W;x+=18){ const y=baseY+Math.sin((x+off)*0.02)*amp*0.5+Math.sin((x+off)*0.006)*amp*0.5; ctx.lineTo(x,y); }
  ctx.lineTo(W,GROUND_Y); ctx.closePath(); ctx.fill();
}
function drawProps(kind,off,accent){
  const gap=170, base=-(((off)%gap)+gap)%gap;
  for(let i=-1;i<=Math.ceil(W/gap)+1;i++){ drawProp(kind, base+i*gap, GROUND_Y, accent); }
}
function drawProp(kind,x,gy,accent){
  ctx.save(); ctx.translate(x,gy);
  ctx.fillStyle="rgba(0,0,0,0.55)"; ctx.strokeStyle=accent; ctx.globalAlpha=0.85; ctx.lineWidth=2;
  if(kind==="tomb"){ roundRect(-16,-54,32,54,8); ctx.fill(); ctx.beginPath(); ctx.moveTo(0,-48); ctx.lineTo(0,-26); ctx.moveTo(-7,-40); ctx.lineTo(7,-40); ctx.stroke(); }
  else if(kind==="crystal"){ ctx.beginPath(); ctx.moveTo(0,-80); ctx.lineTo(12,-24); ctx.lineTo(0,0); ctx.lineTo(-12,-24); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  else if(kind==="glyph"){ ctx.beginPath(); ctx.arc(0,-60,16,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,-78); ctx.lineTo(0,-42); ctx.stroke(); }
  else if(kind==="spirit"){ ctx.globalAlpha=0.4; ctx.beginPath(); ctx.arc(0,-66,12,Math.PI,0); ctx.lineTo(10,-44); ctx.lineTo(-10,-44); ctx.closePath(); ctx.fill(); }
  else if(kind==="saucer"){ ctx.beginPath(); ctx.ellipse(0,-150,18,6,0,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
  else if(kind==="tree"){ ctx.fillRect(-5,-44,10,44); ctx.beginPath(); ctx.arc(0,-54,22,0,Math.PI*2); ctx.fill(); }
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawPlayer(){
  const p=game.player;
  ctx.save();
  const bob=(p.onGround)?Math.sin(p.walk)*3:0;
  ctx.translate(p.x, p.y-bob);
  const blink=p.invuln>0 && Math.floor(p.invuln/4)%2===0;
  ctx.globalAlpha=blink?0.4:1;
  ctx.fillStyle="rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0,2,26,7,0,0,Math.PI*2); ctx.fill();
  const dh = p.ducking ? 74 : 116;
  const dw = (p.ducking ? 0.86 : 0.667) * 116;
  if(heroReady) ctx.drawImage(heroImg,-dw/2,-dh,dw,dh);
  else { ctx.fillStyle="#2b2336"; ctx.fillRect(-20,-(dh*0.83),40,dh*0.83); ctx.fillStyle="#d9b48f"; ctx.beginPath(); ctx.arc(0,-(dh*0.86),15,0,Math.PI*2); ctx.fill(); }
  if(p.flash>0){ const fy=p.ducking?-26:-58; ctx.shadowColor="#cc88ff"; ctx.shadowBlur=20; ctx.fillStyle="#e0b0ff"; ctx.beginPath(); ctx.arc(30,fy,7+p.flash,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; }
  ctx.restore();
}
function drawPBalls(){
  for(const b of game.pballs){
    ctx.save(); ctx.shadowColor="#cc88ff"; ctx.shadowBlur=14;
    const gr=ctx.createRadialGradient(b.x,b.y,1,b.x,b.y,b.r);
    gr.addColorStop(0,"#f3ddff"); gr.addColorStop(0.5,"#b060ff"); gr.addColorStop(1,"#6a00cc");
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}
function drawEnemies(){
  for(const e of game.enemies){
    ctx.save(); ctx.translate(e.x,e.y);
    if(!e.arch.air){ ctx.fillStyle="rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0,e.h/2-2,e.w*0.4,6,0,0,Math.PI*2); ctx.fill(); }
    ctx.font=Math.round(e.h*0.92)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.shadowColor=e.color||"#000"; ctx.shadowBlur=8; ctx.fillText(e.emoji,0,0);
    if(e.flash>0){ ctx.globalCompositeOperation="lighter"; ctx.fillStyle="rgba(255,255,255,0.55)"; ctx.beginPath(); ctx.arc(0,0,e.w*0.42,0,Math.PI*2); ctx.fill(); ctx.globalCompositeOperation="source-over"; }
    ctx.restore();
    if(e.maxhp>1 && e.hp<e.maxhp){ const bw=e.w*0.8; ctx.fillStyle="rgba(0,0,0,0.6)"; ctx.fillRect(e.x-bw/2,e.y-e.h/2-9,bw,4); ctx.fillStyle="#ff5544"; ctx.fillRect(e.x-bw/2,e.y-e.h/2-9,bw*(e.hp/e.maxhp),4); }
  }
}
function drawBigBosses(){
  [game.miniBoss,game.boss].forEach(b=>{
    if(!b) return;
    ctx.save(); ctx.translate(b.x,b.y);
    ctx.font=Math.round(b.h)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.shadowColor=b.color; ctx.shadowBlur=26; ctx.fillText(b.emoji,0,0);
    if(b.flash>0){ ctx.globalCompositeOperation="lighter"; ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(0,0,b.w*0.42,0,Math.PI*2); ctx.fill(); ctx.globalCompositeOperation="source-over"; }
    ctx.restore();
  });
}
function drawEBullets(){
  for(const b of game.ebullets){
    ctx.save(); ctx.shadowColor=b.color; ctx.shadowBlur=12; ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}
function drawParticles(){
  for(const pt of game.particles){ ctx.globalAlpha=Math.max(0,pt.life/30); ctx.fillStyle=pt.color; ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill(); }
  ctx.globalAlpha=1;
}
function drawWeather(){
  if(!game.weather) return;
  const tt=game.weatherT;
  ctx.save(); ctx.fillStyle="rgba(0,0,25,0.16)"; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(180,205,255,0.28)"; ctx.lineWidth=1.4;
  for(let i=0;i<70;i++){ const x=(i*61+tt*7)%W, y=((i*97+tt*26)%(H+40))-20; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-7,y+16); ctx.stroke(); }
  if(Math.random()<0.012){ ctx.fillStyle="rgba(255,255,255,0.16)"; ctx.fillRect(0,0,W,H); }
  ctx.restore();
}
function drawVignette(){
  const r=ctx.createRadialGradient(W/2,H*0.45,H*0.3,W/2,H*0.5,H*0.8);
  r.addColorStop(0,"rgba(0,0,0,0)"); r.addColorStop(1,"rgba(0,0,0,0.55)");
  ctx.fillStyle=r; ctx.fillRect(0,0,W,H);
}

function show(id){ document.getElementById(id).classList.remove("hidden"); }
function hide(id){ document.getElementById(id).classList.add("hidden"); }
function showHUD(on){
  ["hud","hudCenter","controls"].forEach(id=> on?show(id):hide(id));
  if(!on) hide("bossBar");
}
function goTitle(){ state=STATE.TITLE; hide("hubScreen"); hide("endScreen"); show("startScreen"); showHUD(false); }
function goHub(){ state=STATE.HUB; hide("startScreen"); hide("endScreen"); show("hubScreen"); showHUD(false); renderHub(); }
function startLevel(levelId){
  const lvl=LEVELS.find(l=>l.id===levelId); if(!lvl) return;
  if(!save.unlockedLevels.includes(levelId)){ notify("🔒 Nivel bloqueado"); return; }
  game=newGame(levelId);
  state=STATE.PLAYING;
  hide("startScreen"); hide("hubScreen"); hide("endScreen"); hide("bossBar");
  showHUD(true); updateHUD();
  SFX.unlock(); SFX.startAmbient(lvl);
}

function endRun(won){
  game.running=false; SFX.stopAmbient(); if(won) SFX.win(); else SFX.lose();
  save.coins += game.coinsRun;
  game._reward=null;
  if(won){
    const nextId=game.level.id+1;
    if(LEVELS.find(l=>l.id===nextId) && !save.unlockedLevels.includes(nextId)) save.unlockedLevels.push(nextId);
    if(!save.legendsFound.includes(game.level.id)) save.legendsFound.push(game.level.id);
    const rw=ld().reward||{xp:100,ability:""};
    save.xp=(save.xp||0)+rw.xp;
    let newAb=false;
    if(rw.ability && !(save.abilities||[]).includes(rw.ability)){ save.abilities=save.abilities||[]; save.abilities.push(rw.ability); newAb=true; }
    game._reward={ xp:rw.xp, ability:rw.ability, newAbility:newAb, nextId };
  }
  persist();
  hideBossBar();
  if(won) showLegendCard(game.level, ()=>showEnd(true));
  else showEnd(false);
}
function showEnd(won){
  state=STATE.END; showHUD(false);
  hide("startScreen"); hide("hubScreen"); show("endScreen");
  const title=document.getElementById("endTitle");
  if(won){ title.textContent="¡MISIÓN CUMPLIDA!"; title.className="win"; document.getElementById("btnWatchAd").style.display="none"; }
  else { title.textContent="HAS CAÍDO"; title.className="lose"; document.getElementById("btnWatchAd").style.display=""; }
  document.getElementById("endDist").textContent = game.kills + " enemigos derrotados";
  document.getElementById("endCoins").textContent = game.coinsRun;
  const rwEl=document.getElementById("endReward");
  if(won && game._reward){
    const r=game._reward; let html=`⭐ +${r.xp} XP`;
    if(r.ability) html += r.newAbility ? `<br>🔓 Nueva habilidad: <b>${r.ability}</b>` : `<br>✨ ${r.ability}`;
    const next=LEVELS.find(l=>l.id===r.nextId);
    if(next) html += `<br>🗺 Misión desbloqueada: <b>${next.name}</b>`;
    rwEl.innerHTML=html; rwEl.style.display="";
  } else rwEl.style.display="none";
}

const SHOP_ITEMS=[
  { id:"life", icon:"❤", name:"Vida extra (+1 vida máx.)", cost:50, type:"upgrade", apply:()=>{ save.upgrades.maxLives+=1; } },

function openShop(){
  const inner=document.getElementById("modalInner");
  let html=`<div class="modal-title">🛒 Tienda VANTHEL</div><div class="modal-sub">Canjea tus VANTHEL Coins por mejoras y premios</div>
    <div style="margin-bottom:14px;color:var(--gold-light);font-size:13px"><span class="coin-inline"></span> Tienes <b>${save.coins}</b> coins</div>`;
  for(const it of SHOP_ITEMS){
    const owned = it.ability && (save.abilities||[]).includes(it.ability);
    const canBuy = save.coins>=it.cost && !owned;
    html+=`<div class="shop-item"><div class="shop-icon">${it.icon}</div>
      <div class="shop-info"><div class="shop-name">${it.name}</div>
      <div class="shop-cost"><span class="coin-inline"></span> ${it.cost}</div>
      ${it.tag?`<span class="shop-tag">${it.tag}</span>`:""}
      ${it.type==="merch"?`<span class="shop-tag">premio real · requiere registro</span>`:""}</div>
      <button class="shop-buy" data-id="${it.id}" ${canBuy?"":"disabled"}>${owned?"OBTENIDO":"CANJEAR"}</button></div>`;
  }
  html+=`<button class="sec-btn modal-close" id="modalCloseBtn">CERRAR</button>`;
  inner.innerHTML=html;
  document.getElementById("modal").style.display="flex";
  inner.querySelectorAll(".shop-buy").forEach(b=>b.addEventListener("click",()=>buyItem(b.dataset.id)));
  document.getElementById("modalCloseBtn").addEventListener("click",closeModal);

function buyItem(id){
  const it=SHOP_ITEMS.find(i=>i.id===id); if(!it||save.coins<it.cost) return;
  if(it.type==="merch"){ notify("🎁 ¡Premio reservado! Te pediremos tus datos para el envío. (demo)",true); return; }
  save.coins-=it.cost;
  if(it.apply) it.apply();
  if(it.ability){ save.abilities=save.abilities||[]; if(!save.abilities.includes(it.ability)) save.abilities.push(it.ability); }
  persist(); notify("✅ ¡Listo!",true); openShop();
}

      🎯 &nbsp; Acaba con las oleadas de enemigos<br>
      💥 &nbsp; Sobrevive al mini-jefe y al jefe final<br>
      ❤ &nbsp; Pierdes una vida si te tocan
    </div>
    <button class="sec-btn modal-close" id="modalCloseBtn">ENTENDIDO</button>`;
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalCloseBtn").addEventListener("click",closeModal);
}

/* ---- BOTONES ---- */
document.getElementById("btnStart").addEventListener("click",()=>{ SFX.unlock(); goHub(); });
document.getElementById("btnHowTo").addEventListener("click",openHowTo);
document.getElementById("btnBackTitle").addEventListener("click",goTitle);
document.getElementById("btnShop").addEventListener("click",openShop);
document.getElementById("btnCodes").addEventListener("click",openCodes);
document.getElementById("btnRetry").addEventListener("click",()=>startLevel(game.level.id));
document.getElementById("btnEndHub").addEventListener("click",goHub);
document.getElementById("btnWatchAd").addEventListener("click",watchAdForLife);

function updateMuteLabel(){ const m=SFX.isMuted(); document.querySelectorAll(".mute-btn").forEach(b=>b.textContent=m?"🔇 SONIDO: OFF":"🔊 SONIDO: ON"); }
document.querySelectorAll(".mute-btn").forEach(b=>b.addEventListener("click",()=>{ SFX.toggleMute(); updateMuteLabel(); }));
updateMuteLabel();

/* ---- ESTRELLAS ---- */
function makeStars(id,n){ const c=document.getElementById(id); if(!c) return;
  for(let i=0;i<n;i++){ const s=document.createElement("div"); s.className="star"; const sz=Math.random()*2+1;
    s.style.width=s.style.height=sz+"px"; s.style.left=Math.random()*100+"%"; s.style.top=Math.random()*100+"%";
    s.style.setProperty("--d",(1.5+Math.random()*2.5)+"s"); s.style.animationDelay=Math.random()*3+"s"; c.appendChild(s); } }
makeStars("starsHub",40); makeStars("starsEnd",40);

/* ---- ARRANQUE ---- */
goTitle();
requestAnimationFrame(loop);
</script>
</body>
